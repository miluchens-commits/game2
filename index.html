<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍊 果子大戰 Fruit Egg War</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
@font-face{font-family:'Emoji';src:local('Segoe UI Emoji'),local('Apple Color Emoji')}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden}
#container{position:relative;width:1000px;height:700px;border:3px solid #e67e22;border-radius:16px;overflow:hidden;box-shadow:0 0 60px rgba(230,126,34,0.4)}
canvas{display:block;width:100%;height:100%;background:#87CEEB}
#ui{position:absolute;top:0;left:0;right:0;padding:8px 16px;background:rgba(0,0,0,0.6);display:flex;justify-content:space-between;align-items:center;color:#fff;font-size:14px;pointer-events:none;z-index:10}
#ui span{margin:0 6px}
#bottom-bar{position:absolute;bottom:0;left:0;right:0;padding:8px;background:rgba(0,0,0,0.7);display:flex;justify-content:center;gap:6px;z-index:10;flex-wrap:wrap}
.btn{padding:7px 14px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold;color:#fff;pointer-events:auto;transition:all 0.15s}
.btn:hover{transform:scale(1.08);filter:brightness(1.2)}
.btn:active{transform:scale(0.95)}
.btn-orange{background:#e67e22}
.btn-blue{background:#3498db}
.btn-green{background:#27ae60}
.btn-red{background:#e74c3c}
.btn-purple{background:#9b59b6}
.btn-pink{background:#e84393}
.btn-sm{padding:4px 10px;font-size:11px}
#panel-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);z-index:20;display:none;justify-content:center;align-items:center}
#panel-box{background:linear-gradient(135deg,#2d2d44,#1a1a2e);border:2px solid #e67e22;border-radius:16px;padding:24px 32px;min-width:350px;max-height:85vh;overflow-y:auto;color:#fff;text-align:center}
#panel-box h2{color:#f39c12;margin-bottom:12px;font-size:22px}
#panel-box p{margin:6px 0;font-size:14px;color:#ccc}
#panel-box .row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:8px 0}
#panel-box .item{background:rgba(255,255,255,0.08);border-radius:10px;padding:8px 12px;cursor:pointer;transition:0.12s;min-width:70px}
#panel-box .item:hover{background:rgba(255,255,255,0.18);transform:scale(1.05)}
#panel-box .item.owned{border:1px solid #2ecc71}
#panel-box .item.locked{opacity:0.5;cursor:default}
.close-btn{position:absolute;top:8px;right:14px;font-size:24px;cursor:pointer;color:#e74c3c;z-index:30;pointer-events:auto}
.close-btn:hover{transform:scale(1.2)}
.currency-icon{font-size:16px}
#mini-toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);color:#fff;padding:12px 24px;border-radius:12px;font-size:18px;z-index:40;display:none;border:2px solid #f39c12;text-align:center;pointer-events:none}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#e67e22;border-radius:3px}
</style>
</head>
<body>

<div id="container">
  <canvas id="game" width="1000" height="700"></canvas>

  <div id="ui">
    <div>🍊 <span id="fruitCoin">100</span> | ✨ <span id="sparkleCoin">10</span></div>
    <div>🏝️ <span id="locationText">果子島</span> | 🎭 <span id="expressionText">開心</span></div>
  </div>

  <div id="bottom-bar">
    <div id="normal-buttons">
      <button class="btn btn-orange" onclick="openShop()">🏪 商店</button>
      <button class="btn btn-purple" onclick="openGacha()">🎁 盲盒</button>
      <button class="btn btn-green" onclick="openAchievements()">🏆 成就</button>
      <button class="btn btn-blue" onclick="openMiniGames()">🎮 小遊戲</button>
      <button class="btn btn-pink" onclick="openIslands()">🗺️ 島嶼</button>
      <button class="btn" style="background:#e84393" onclick="openExpressions()">🎭 表情</button>
      <button class="btn" style="background:#00b894" onclick="openDecoration()">💎 裝飾</button>
    </div>
    <div id="mg-buttons" style="display:none">
      <button class="btn btn-red" onclick="exitMiniGame()">🚪 離開小遊戲 (ESC)</button>
      <span id="mg-status" style="color:#fff;font-size:13px;margin-left:8px"></span>
    </div>
  </div>

  <div id="panel-overlay">
    <span class="close-btn" onclick="closePanel()">&times;</span>
    <div id="panel-box"></div>
  </div>

  <div id="mini-toast"></div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 1000, H = 700;

// ===== GAME STATE =====
const G = {
  scene: 'game',
  fruitCoin: 100,
  sparkleCoin: 10,
  roomCards: 10,
  location: 'fruitIsland',
  expression: 0,
  
  // Player
  player: { x: 500, y: 400, vx: 0, vy: 0, w: 32, h: 38, speed: 3 },
  keys: {},
  
  // Islands
  islands: {
    fruitIsland: { name: '果子島', color: '#4CAF50', spawn: {x:500,y:400} },
    abbyTown:    { name: '愛比小鎮', color: '#FF9800', spawn: {x:500,y:400} },
    space:       { name: '太空冒險島', color: '#673AB7', spawn: {x:500,y:400} },
    okinawa:     { name: '沖繩旅遊島', color: '#00BCD4', spawn: {x:500,y:400} }
  },
  
  // Decorations owned
  decorations: [],
  equippedHead: null,
  equippedBody: null,
  
  // Achievements
  achievements: [
    { id:'a1', name:'第一步', desc:'移動100步', goal:100, progress:0, done:false, reward:10 },
    { id:'a2', name:'果子收集者', desc:'獲得500果子幣', goal:500, progress:100, done:false, reward:30 },
    { id:'a3', name:'盲盒愛好者', desc:'抽10次盲盒', goal:10, progress:0, done:false, reward:20 },
    { id:'a4', name:'旅人', desc:'訪問3個島嶼', goal:3, progress:1, done:false, reward:30 },
    { id:'a5', name:'表情大師', desc:'切換5次表情', goal:5, progress:0, done:false, reward:15 },
    { id:'a6', name:'時尚達人', desc:'購買3件裝飾', goal:3, progress:0, done:false, reward:25 },
    { id:'a7', name:'小炸彈 survivor', desc:'在炸彈模式存活', goal:1, progress:0, done:false, reward:50 },
    { id:'a8', name:'百萬富翁', desc:'擁有1000果子幣', goal:1000, progress:100, done:false, reward:100 },
  ],
  
  // Owned gacha items (equippable)
  gachaItems: [],
  gachaDecorationItems: [],
  
  // Shop items
  shopUnlocked: [],
  
  // minigame state
  mg: null, // {type, ...}
  
  // Moving UFO on space island
  ufo: { x: 120, y: 350, vx: 0, vy: 0, targetX: 120, targetY: 350, changeTimer: 0 },
};

const EXPRESSIONS = ['😀','😢','😡','😗','😎'];
const EXPRESSION_NAMES = ['開心','難過','生氣','嘟嘴','得意'];

let toastTimer = null;
let frameCount = 0;
let stepCount = 0;

// ===== DRAWING =====
function drawScene() {
  ctx.clearRect(0, 0, W, H);
  const island = G.islands[G.location];
  
  // Sky gradient
  const grad = ctx.createLinearGradient(0,0,0,H);
  if (G.location === 'space') {
    grad.addColorStop(0,'#000011'); grad.addColorStop(1,'#0a0a2e');
  } else if (G.location === 'okinawa') {
    grad.addColorStop(0,'#87CEEB'); grad.addColorStop(1,'#E0F7FA');
  } else {
    grad.addColorStop(0,'#87CEEB'); grad.addColorStop(1,'#B0E0E6');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
  
  // Ground
  const groundY = 500;
  if (G.location === 'space') {
    // Moon surface
    ctx.fillStyle = '#8a8a8a';
    ctx.fillRect(0,groundY,W,H-groundY);
    // Moon ground texture - fixed craters
    const craters = [
      {x:100,y:540,r:18},{x:250,y:580,r:25},{x:400,y:520,r:12},{x:550,y:600,r:30},
      {x:700,y:530,r:15},{x:850,y:570,r:22},{x:150,y:630,r:10},{x:350,y:650,r:20},
      {x:500,y:640,r:14},{x:680,y:620,r:28},{x:800,y:650,r:16},{x:50,y:580,r:8},
      {x:900,y:520,r:12},{x:450,y:560,r:8},{x:620,y:550,r:10}
    ];
    ctx.fillStyle = '#6a6a6a';
    craters.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill(); });
    ctx.fillStyle = '#999';
    craters.forEach(c => { ctx.beginPath(); ctx.arc(c.x-3, c.y-3, c.r*0.4, 0, Math.PI*2); ctx.fill(); });
  } else if (G.location === 'okinawa') {
    ctx.fillStyle = '#F5DEB3';
    ctx.fillRect(0,groundY,W,H-groundY);
    ctx.fillStyle = '#FFE4B5';
    ctx.fillRect(0,groundY+20,W,20);
    // Water
    ctx.fillStyle = 'rgba(0,150,200,0.3)';
    ctx.fillRect(0,groundY+50,W,H-groundY-50);
  } else {
    ctx.fillStyle = island.color;
    ctx.fillRect(0,groundY,W,H-groundY);
    // Grass details - fixed positions
    const grassBlades = [
      {x:50,y:10,w:2,h:8},{x:120,y:30,w:1,h:6},{x:200,y:50,w:2,h:10},{x:280,y:20,w:1,h:7},
      {x:350,y:60,w:2,h:9},{x:430,y:15,w:1,h:5},{x:510,y:45,w:2,h:8},{x:590,y:25,w:1,h:7},
      {x:670,y:55,w:2,h:10},{x:750,y:10,w:1,h:6},{x:830,y:40,w:2,h:9},{x:910,y:30,w:1,h:7},
      {x:80,y:65,w:2,h:8},{x:170,y:20,w:1,h:5},{x:260,y:50,w:2,h:9},{x:340,y:35,w:1,h:6},
      {x:420,y:60,w:2,h:7},{x:500,y:15,w:1,h:8},{x:580,y:50,w:2,h:10},{x:660,y:20,w:1,h:6},
      {x:740,y:55,w:2,h:8},{x:820,y:10,w:1,h:5},{x:900,y:45,w:2,h:9},{x:960,y:30,w:1,h:7},
      {x:30,y:40,w:2,h:6},{x:160,y:55,w:1,h:9},{x:310,y:25,w:2,h:7},{x:470,y:50,w:1,h:8},
      {x:630,y:15,w:2,h:6},{x:790,y:40,w:1,h:10},{x:950,y:20,w:2,h:8},{x:110,y:70,w:1,h:5}
    ];
    ctx.fillStyle = 'rgba(0,120,0,0.3)';
    grassBlades.forEach(g => ctx.fillRect(g.x, groundY+g.y, g.w, g.h));
  }
  
  // Paths
  drawPaths();
  
  // NPCs / buildings
  drawBuildings();
  
  // Stars in space sky
  if (G.location === 'space') {
    for (let i=0;i<120;i++) {
      const sx = (i * 137.5 + 50) % W;
      const sy = (i * 89.3 + 20) % 480;
      const size = 0.8 + (i % 4) * 0.6;
      const twinkle = Math.sin(frameCount * 0.04 + i * 2.3) * 0.5 + 0.5;
      const brightness = 0.3 + twinkle * 0.7;
      ctx.fillStyle = `rgba(255,255,255,${brightness * (0.4 + (i % 5) * 0.12)})`;
      ctx.beginPath();
      ctx.arc(sx, sy, size, 0, Math.PI*2);
      ctx.fill();
      // Big stars with cross glow
      if (i % 15 === 0) {
        ctx.strokeStyle = `rgba(200,200,255,${brightness * 0.3})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(sx-6, sy); ctx.lineTo(sx+6, sy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(sx, sy-6); ctx.lineTo(sx, sy+6); ctx.stroke();
      }
    }
    // Nebula effect
    const ng = ctx.createRadialGradient(300, 150, 20, 300, 150, 200);
    ng.addColorStop(0, 'rgba(100,0,150,0.08)');
    ng.addColorStop(1, 'rgba(100,0,150,0)');
    ctx.fillStyle = ng;
    ctx.fillRect(0, 0, W, 480);
  }
  
  // Trees / decor
  drawDecor();
  
  // Player
  drawPlayer();
  
  // Mini game overrides
  if (G.mg) drawMiniGame();
}

function drawPaths() {
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 3;
  ctx.setLineDash([8,12]);
  ctx.beginPath();
  ctx.moveTo(100,520); ctx.lineTo(900,520);
  ctx.moveTo(500,520); ctx.lineTo(500,680);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawBuildings() {
  const blds = [
    { x:150, y:475, w:90, h:55, label:'🏪商店', color:'#e67e22' },
    { x:350, y:475, w:90, h:55, label:'🎁盲盒', color:'#9b59b6' },
    { x:550, y:475, w:90, h:55, label:'🏆成就館', color:'#f1c40f' },
    { x:750, y:475, w:90, h:55, label:'☕咖啡館', color:'#8B4513' },
  ];
  if (G.location === 'fruitIsland') {
    blds.forEach(b => {
      ctx.fillStyle = b.color;
      ctx.shadowColor = 'rgba(0,0,0,0.2)';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.roundRect(b.x,b.y,b.w,b.h,6);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      ctx.font = '12px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(b.label, b.x+b.w/2, b.y+b.h/2+4);
    });
  }
  
  if (G.location === 'okinawa') {
    ctx.fillStyle = '#FFB6C1'; ctx.beginPath(); ctx.roundRect(200,470,100,55,8); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font='13px Arial'; ctx.textAlign='center'; ctx.fillText('🐠 水族館',250,500);
    
    ctx.fillStyle = '#D4A574'; ctx.beginPath(); ctx.roundRect(600,470,100,55,8); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.fillText('🏯 古城',650,500);
    
    ctx.fillStyle = '#90EE90'; ctx.beginPath(); ctx.roundRect(400,530,80,40,8); ctx.fill();
    ctx.fillStyle = '#333'; ctx.font='11px Arial'; ctx.fillText('🌺 花園',440,555);
  }
}

function drawDecor() {
  // Trees (not in space)
  if (G.location !== 'space') {
    for (let i=0;i<8;i++) {
      const tx = 50 + i * 120 + Math.sin(i*3)*30;
      if (tx > 1000) continue;
      ctx.fillStyle = '#2d7d2d';
      ctx.beginPath();
      ctx.arc(tx, 470, 18, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(tx-3, 475, 6, 15);
    }
  }
  // Teleport zone indicators
  if (G.location === 'fruitIsland') {
    ctx.font='40px Arial'; ctx.textAlign='center';
    ctx.fillText('🍊', 500, 100);
    ctx.font='18px Arial'; ctx.fillStyle='#fff'; ctx.fillText('果子島', 500, 130);
    // Teleport arrows
    ctx.font='22px Arial'; ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('▶', 965, 520); ctx.fillText('◀', 30, 520);
    ctx.fillText('▲', 500, 35);
    ctx.font='10px Arial'; ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.fillText('愛比小鎮→', 940, 540); ctx.fillText('←太空冒險', 20, 540);
    ctx.fillText('沖繩↑', 485, 48);
  }
  if (G.location === 'okinawa') {
    for (let i=0;i<5;i++) {
      ctx.font='18px Arial'; ctx.textAlign='center';
      ctx.fillText('🐚', 100+i*200, 540+Math.sin(i)*15);
    }
    ctx.font='14px Arial'; ctx.fillStyle='#fff';
    ctx.fillText('🌴 沖繩旅遊島', 500, 130);
    ctx.font='22px Arial'; ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('◀ 回果子島', 55, 50);
  }
  if (G.location === 'space') {
    ctx.font='16px Arial'; ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.fillText('🚀 太空冒險島', 500, 130);
    ctx.font='22px Arial';
    ctx.fillText('🪐', 750, 200);
    // Moving UFO
    const ufoBob = Math.sin(frameCount * 0.05) * 5;
    ctx.font='26px Arial';
    ctx.fillText('🛸', G.ufo.x, G.ufo.y + ufoBob);
    ctx.font='22px Arial'; ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('◀ 回果子島', 55, 50);
  }
  if (G.location === 'abbyTown') {
    ctx.font='18px Arial'; ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.fillText('🏠 愛比小鎮', 500, 130);
    ctx.font='22px Arial'; ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('◀ 回果子島', 55, 50);
  }
}

function drawPlayer() {
  const p = G.player;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(p.x, p.y+38, 18, 5, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Body (egg)
  const grad = ctx.createRadialGradient(p.x-5, p.y-5, 5, p.x, p.y, 20);
  if (G.equippedBody) {
    grad.addColorStop(0, '#FFE4B5'); grad.addColorStop(1, '#DEB887');
  } else {
    grad.addColorStop(0, '#FFF8DC'); grad.addColorStop(1, '#F5DEB3');
  }
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(p.x, p.y+15, 16, 20, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#D2B48C';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  
  // Head decoration
  if (G.equippedHead) {
    ctx.font = '20px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(G.equippedHead.icon || '👑', p.x, p.y-5);
  }
  
  // Body decoration (below face, on body)
  if (G.equippedBody) {
    const bodyColor = G.equippedBody.color || '#e74c3c';
    ctx.fillStyle = bodyColor;
    ctx.fillRect(p.x-10, p.y+28, 20, 8);
    ctx.strokeStyle = bodyColor;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(p.x-10, p.y+28, 20, 8);
    if (G.equippedBody.icon) {
      ctx.font = '12px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(G.equippedBody.icon, p.x, p.y+27);
    }
  }
  
  // Legs (animate when moving)
  const isMoving = Math.abs(p.vx) > 0.2 || Math.abs(p.vy) > 0.2;
  const legSwing = isMoving ? Math.sin(frameCount * 0.2) * 8 : 0;
  ctx.strokeStyle = '#D2B48C';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(p.x-6, p.y+34);
  ctx.lineTo(p.x-10 + legSwing, p.y+44);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x+6, p.y+34);
  ctx.lineTo(p.x+10 - legSwing, p.y+44);
  ctx.stroke();
  
  // Arms (animate opposite to legs)
  const armSwing = isMoving ? Math.sin(frameCount * 0.2 + Math.PI) * 6 : 2;
  ctx.strokeStyle = '#D2B48C';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(p.x-14, p.y+10);
  ctx.lineTo(p.x-20 + armSwing, p.y+22);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(p.x+14, p.y+10);
  ctx.lineTo(p.x+20 - armSwing, p.y+22);
  ctx.stroke();
  
  const blink = Math.sin(frameCount * 0.05) > 0.95;
  const exIdx = G.expression;
  const eyeY = p.y + 10;
  const mouthY = p.y + 22;
  
  // Eyebrows
  ctx.strokeStyle = '#5a3a1a';
  ctx.lineWidth = 2.5;
  if (exIdx === 2) {
    ctx.beginPath(); ctx.moveTo(p.x-12, eyeY-8); ctx.lineTo(p.x-4, eyeY-4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x+12, eyeY-8); ctx.lineTo(p.x+4, eyeY-4); ctx.stroke();
  } else if (exIdx === 1) {
    ctx.beginPath(); ctx.moveTo(p.x-4, eyeY-8); ctx.lineTo(p.x-12, eyeY-4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x+4, eyeY-8); ctx.lineTo(p.x+12, eyeY-4); ctx.stroke();
  } else if (exIdx === 4) {
    ctx.beginPath(); ctx.moveTo(p.x-12, eyeY-6); ctx.lineTo(p.x-4, eyeY-8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x+4, eyeY-8); ctx.lineTo(p.x+12, eyeY-6); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(p.x-12, eyeY-6); ctx.lineTo(p.x-4, eyeY-8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x+4, eyeY-8); ctx.lineTo(p.x+12, eyeY-6); ctx.stroke();
  }
  
  // Eyes
  if (!blink) {
    if (exIdx === 4) {
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.lineTo(p.x-8, eyeY-2); ctx.lineTo(p.x-4, eyeY+2); ctx.lineTo(p.x-8, eyeY+3); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.arc(p.x+6, eyeY, 2.5, 0, Math.PI*2); ctx.fill();
    } else if (exIdx === 1) {
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(p.x-6, eyeY, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(p.x+6, eyeY, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(100,150,255,0.3)';
      ctx.beginPath(); ctx.arc(p.x-8, eyeY+4, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(p.x+4, eyeY+4, 3, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(p.x-6, eyeY, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(p.x+6, eyeY, 2.5, 0, Math.PI*2); ctx.fill();
    }
    // Eye shine
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(p.x-7, eyeY-2, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(p.x+5, eyeY-2, 1, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(p.x-8, eyeY); ctx.lineTo(p.x-4, eyeY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x+4, eyeY); ctx.lineTo(p.x+8, eyeY); ctx.stroke();
  }
  
  // Mouth
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  const mouthOpen = Math.sin(frameCount * 0.08) * 0.3 + 0.7;
  if (exIdx === 0) {
    ctx.beginPath(); ctx.arc(p.x, mouthY+1, 5, 0.1, Math.PI-0.1); ctx.stroke();
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath(); ctx.arc(p.x-6, mouthY-1, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(p.x+6, mouthY-1, 2, 0, Math.PI*2); ctx.fill();
  } else if (exIdx === 1) {
    ctx.beginPath(); ctx.arc(p.x, mouthY+6, 5, Math.PI+0.1, -0.1); ctx.stroke();
  } else if (exIdx === 2) {
    ctx.fillStyle = '#333';
    const oh = 4 * mouthOpen;
    ctx.beginPath(); ctx.ellipse(p.x, mouthY+2, 4, oh, 0, 0, Math.PI*2); ctx.fill();
  } else if (exIdx === 3) {
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath(); ctx.arc(p.x, mouthY, 3, 0, Math.PI*2); ctx.fill();
  } else if (exIdx === 4) {
    ctx.beginPath(); ctx.arc(p.x-1, mouthY+1, 4, 0.3, Math.PI-0.3); ctx.stroke();
  }
  
  // Name
  ctx.font = '11px Arial';
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.textAlign = 'center';
  ctx.strokeText('玩家', p.x, p.y-22);
  ctx.fillText('玩家', p.x, p.y-22);
}

// ===== UPDATE =====
function update() {
  if (G.scene !== 'game') return;
  if (G.mg) { updateMiniGame(); return; }
  
  const p = G.player;
  let dx = 0, dy = 0;
  if (G.keys['w']||G.keys['arrowup']) dy = -1;
  if (G.keys['s']||G.keys['arrowdown']) dy = 1;
  if (G.keys['a']||G.keys['arrowleft']) dx = -1;
  if (G.keys['d']||G.keys['arrowright']) dx = 1;
  
  if (dx!==0 || dy!==0) {
    const len = Math.sqrt(dx*dx+dy*dy);
    p.vx = (dx/len)*p.speed;
    p.vy = (dy/len)*p.speed;
    p.x += p.vx;
    p.y += p.vy;
    stepCount++;
    // Check achievement
    checkAchievement('a1', stepCount);
  } else {
    p.vx *= 0.85;
    p.vy *= 0.85;
    p.x += p.vx;
    p.y += p.vy;
  }
  
  p.x = Math.max(20, Math.min(W-20, p.x));
  p.y = Math.max(50, Math.min(H-30, p.y));
  
  // Proximity triggers (auto-detect when walking near points of interest)
  const panelShowing = document.getElementById('panel-overlay').style.display !== 'none';
  if (!G.promptLock && !panelShowing) {
    const px = p.x, py = p.y;
    const nearX = (cx, margin=40) => Math.abs(px-cx) < margin;
    if (G.location === 'fruitIsland') {
      if (px > 920) { G.promptLock = 'teleport'; confirmTeleport('abbyTown', '愛比小鎮'); }
      else if (px < 80) { G.promptLock = 'teleport'; confirmTeleport('space', '太空冒險島'); }
      else if (py < 60) { G.promptLock = 'teleport'; confirmTeleport('okinawa', '沖繩旅遊島'); }
      else if (py>440 && py<560) {
        if (nearX(190)) { G.promptLock = 'shop'; openShop(); }
        else if (nearX(390)) { G.promptLock = 'gacha'; openGacha(); }
        else if (nearX(790)) { G.promptLock = 'cafe'; showToast('☕ 咖啡館 - 休息中...'); }
        else if (nearX(590)) { G.promptLock = 'achieve'; openAchievements(); }
      }
    } else if (G.location === 'abbyTown' && (px < 80 || px > 920)) {
      G.promptLock = 'teleport'; confirmTeleport('fruitIsland', '果子島');
    } else if (G.location === 'space' && (px < 80 || px > 920)) {
      G.promptLock = 'teleport'; confirmTeleport('fruitIsland', '果子島');
    } else if (G.location === 'okinawa' && (px < 80 || px > 920)) {
      G.promptLock = 'teleport'; confirmTeleport('fruitIsland', '果子島');
    }
  }
  // Reset lock when player moves away from trigger zone
  if (G.promptLock === 'teleport') {
    const exitEdge = G.location === 'fruitIsland'
      ? (p.x > 100 && p.x < 900 && p.y > 100)
      : (p.x > 100 && p.x < 900);
    if (exitEdge) G.promptLock = null;
  }
  if (G.promptLock && G.promptLock !== 'teleport' && G.promptLock !== 'cooldown') {
    if (p.y < 400 || p.y > 600 || G.location !== 'fruitIsland') G.promptLock = null;
  }
  
  // Location labels -> click detection done via canvas click
  
  // UFO movement on space island
  if (G.location === 'space') {
    G.ufo.changeTimer--;
    if (G.ufo.changeTimer <= 0) {
      G.ufo.targetX = 80 + Math.random() * 840;
      G.ufo.targetY = 150 + Math.random() * 300;
      G.ufo.changeTimer = 60 + Math.floor(Math.random() * 120);
    }
    G.ufo.vx += (G.ufo.targetX - G.ufo.x) * 0.005;
    G.ufo.vy += (G.ufo.targetY - G.ufo.y) * 0.005;
    G.ufo.vx *= 0.95;
    G.ufo.vy *= 0.95;
    G.ufo.x += G.ufo.vx;
    G.ufo.y += G.ufo.vy;
  }
  
  frameCount++;
  if (frameCount % 60 === 0) {
    checkAchievement('a2', G.fruitCoin);
    checkAchievement('a8', G.fruitCoin);
  }
}

// ===== CANVAS EVENTS =====
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  
  if (G.mg) {
    handleMiniGameClick(mx, my);
    return;
  }
  
  // Teleport zones at edges
  if (G.location === 'fruitIsland') {
    if (mx > 920) { confirmTeleport('abbyTown', '愛比小鎮'); return; }
    if (mx < 80) { confirmTeleport('space', '太空冒險島'); return; }
    if (my < 60) { confirmTeleport('okinawa', '沖繩旅遊島'); return; }
  }
  if (G.location === 'abbyTown') {
    if (mx < 80 || mx > 920) { confirmTeleport('fruitIsland', '果子島'); return; }
  }
  if (G.location === 'space') {
    if (mx < 80 || mx > 920) { confirmTeleport('fruitIsland', '果子島'); return; }
  }
  if (G.location === 'okinawa') {
    if (mx < 80 || mx > 920) { confirmTeleport('fruitIsland', '果子島'); return; }
  }
  
  // Island-specific click areas
  if (G.location === 'fruitIsland') {
    if (my<440 || my>560) return;
    if (mx>350 && mx<430) { openGacha(); return; }
    if (mx>750 && mx<830) { showToast('☕ 咖啡館 - 休息中...'); return; }
    if (mx>150 && mx<230) { openShop(); return; }
    if (mx>550 && mx<630) { openAchievements(); return; }
  }
  if (G.location === 'okinawa') {
    if (mx>200 && mx<300 && my>450 && my<530) { showToast('🐠 水族館：鯨鯊、海龜、熱帶魚、水母'); return; }
    if (mx>600 && mx<700 && my>450 && my<530) { showToast('🏯 古城導覽 - 獲得紀念徽章！'); addFruitCoin(20); return; }
    if (mx>400 && mx<480 && my>500 && my<580) { showToast('🌺 花園拍照區'); return; }
  }
});

// ===== TELEPORT =====
function teleportTo(id) {
  if (!G.islands[id]) return;
  G.location = id;
  const sp = G.islands[id].spawn;
  G.player.x = sp.x;
  G.player.y = sp.y;
  document.getElementById('locationText').textContent = G.islands[id].name;
  closePanel();
  G.promptLock = 'cooldown';
  setTimeout(() => { if (G.promptLock === 'cooldown') G.promptLock = null; }, 800);
  
  let visited = parseInt(localStorage.getItem('visitedIslands')||'1');
  if (!localStorage.getItem('island_'+id)) {
    localStorage.setItem('island_'+id, '1');
    visited++;
    localStorage.setItem('visitedIslands', visited.toString());
    checkAchievement('a4', visited);
  }
}

const GACHA_POOL = [
  { name:'草帽', icon:'👒', rarity:'C', weight:30 },
  { name:'墨鏡', icon:'🕶️', rarity:'C', weight:25 },
  { name:'紅領巾', icon:'🧣', rarity:'C', weight:20 },
  { name:'星星髮夾', icon:'⭐', rarity:'R', weight:10 },
  { name:'小惡魔角', icon:'😈', rarity:'R', weight:7 },
  { name:'彩虹翅膀', icon:'🌈', rarity:'E', weight:5 },
  { name:'黃金蛋殼', icon:'🥚', rarity:'E', weight:2 },
  { name:'傳說光環', icon:'✨', rarity:'L', weight:1 },
  { name:'獨角獸角', icon:'🦄', rarity:'L', weight:0.5 },
];

function pullGacha(type, cost) {
  if (type === 'fruit' && !spendFruitCoin(cost)) return;
  if (type === 'sparkle' && G.sparkleCoin < cost) { showToast('❌ 閃彩幣不足！'); return; }
  if (type === 'sparkle') { G.sparkleCoin -= cost; document.getElementById('sparkleCoin').textContent = G.sparkleCoin; }
  
  // Roll
  const totalWeight = GACHA_POOL.reduce((s,i)=>s+i.weight, 0);
  let roll = Math.random() * totalWeight;
  let picked = GACHA_POOL[0];
  for (const item of GACHA_POOL) {
    roll -= item.weight;
    if (roll <= 0) { picked = item; break; }
  }
  
  // Save
  const items = JSON.parse(localStorage.getItem('gachaItems')||'[]');
  items.push(picked);
  localStorage.setItem('gachaItems', JSON.stringify(items));
  const owned = JSON.parse(localStorage.getItem('gachaOwned')||'[]');
  owned.push(picked.name);
  localStorage.setItem('gachaOwned', JSON.stringify(owned));
  
  const colors = {C:'普通',R:'稀有',E:'史詩',L:'傳說'};
  showToast(`🎉 抽到 [${colors[picked.rarity]}] ${picked.icon} ${picked.name}！`);
  
  // Save as equippable decoration
  const gachaDeco = { id:'gacha_'+Date.now(), name:picked.name, cat: (['紅領巾','彩虹翅膀','黃金蛋殼','傳說光環'].includes(picked.name)?'body':'head'), icon:picked.icon, color:['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6'][Math.floor(Math.random()*5)], fromGacha:true };
  const gachaDecos = JSON.parse(localStorage.getItem('gachaDecos')||'[]');
  gachaDecos.push(gachaDeco);
  localStorage.setItem('gachaDecos', JSON.stringify(gachaDecos));
  
  // Track gacha count
  const gc = parseInt(localStorage.getItem('gachaCount')||'0')+1;
  localStorage.setItem('gachaCount', gc.toString());
  checkAchievement('a3', gc);
  
  openGacha();
}

function openAchievements() {
  const done = JSON.parse(localStorage.getItem('achievementsDone')||'[]');
  const total = G.achievements.length;
  const unlocked = done.length;
  let tier = '新手';
  if (unlocked>=10) tier='中等';
  if (unlocked>=30) tier='高級';
  if (unlocked>=50) tier='困難';
  if (unlocked>=180) tier='超級無敵高級';
  
  let html = `<h2>🏆 成就系統</h2>`;
  html += `<p>已解鎖: ${unlocked}/${total} | 階級: ${tier}</p>`;
  html += '<div class="row" style="flex-direction:column;align-items:stretch;max-width:400px;margin:auto">';
  G.achievements.forEach(a => {
    const isDone = done.includes(a.id);
    const prog = Math.min(100, (a.progress/a.goal)*100);
    html += `<div class="item" style="${isDone?'border:2px solid #2ecc71':''}">
      <div style="display:flex;justify-content:space-between">
        <span>${isDone?'✅':''} ${a.name}</span>
        <span style="color:#f39c12">🍊+${a.reward}</span>
      </div>
      <div style="font-size:11px;color:#aaa">${a.desc}</div>
      <div style="background:#333;height:6px;border-radius:3px;margin-top:4px">
        <div style="background:${isDone?'#2ecc71':'#f39c12'};width:${isDone?100:prog}%;height:6px;border-radius:3px"></div>
      </div>
    </div>`;
  });
  html += '</div>';
  showPanel(html);
}

function checkAchievement(id, value) {
  const a = G.achievements.find(x=>x.id===id);
  if (!a || a.done) return;
  a.progress = value;
  if (a.progress >= a.goal) {
    const done = JSON.parse(localStorage.getItem('achievementsDone')||'[]');
    if (done.includes(id)) return;
    done.push(id);
    localStorage.setItem('achievementsDone', JSON.stringify(done));
    a.done = true;
    addFruitCoin(a.reward);
    showToast(`🏆 成就解鎖：${a.name}！+${a.reward}🍊`);
  }
}

      const isEquipped = (item.cat==='head' && equippedHead===('gacha_'+idx)) || (item.cat==='body' && equippedBody===('gacha_'+idx));
      html += `<div class="item" style="display:inline-block;margin:4px;${isEquipped?'border:2px solid #2ecc71':''}" onclick="equipDeco('gacha_${idx}','${item.cat}','gacha')">
        <div style="font-size:22px">${item.icon||'🎁'}</div>
        <div style="font-size:11px">${item.name}</div>
        <div style="font-size:10px;color:#aaa">${isEquipped?'✅':item.cat==='head'?'頭部':'身體'}</div>
      </div>`;
    });
  }
  
  if (!hasItems) html += '<p style="color:#aaa">尚無任何裝飾，去商店購買或抽盲盒吧！</p>';
  html += '</div>';
  showPanel(html);
}

function equipDeco(id, cat, source) {
  let item;
  if (source === 'shop') {
    item = SHOP_ITEMS.find(i=>i.id===id);
  } else {
    const gachaDecos = JSON.parse(localStorage.getItem('gachaDecos')||'[]');
    const idx = parseInt(id.replace('gacha_',''));
    item = gachaDecos[idx];
    if (item) item._gachaIdx = idx;
  }
  if (!item) return;
  if (cat === 'head') {
    localStorage.setItem('equippedHead', source==='shop' ? id : id);
    G.equippedHead = item;
    localStorage.setItem('equippedHeadName', item.name);
  } else {
    localStorage.setItem('equippedBody', source==='shop' ? id : id);
    G.equippedBody = item;
    localStorage.setItem('equippedBodyName', item.name);
  }
  showToast(`✅ 已裝備 ${item.name}`);
  openDecoration();
}

// ===== MINIGAME UPDATE =====
let mgBullets = [];
let mgEnemies = [];
let mgParticles = [];

function updateMiniGame() {
  if (!G.mg) return;
  const mg = G.mg;
  if (mg.phase === 'won' || mg.phase === 'lost') return;
  
  if (mg.type === 'bomb') {
    mg.timer -= 1/60;
    if (mg.timer <= 0) {
      mg.phase = 'lost';
      showToast('💥 炸彈爆炸！你被淘汰了！');
      checkAchievement('a7', 1);
      setTimeout(()=>{ exitMiniGame(); }, 2000);
    }
  }
  
  if (mg.type === 'fighter') {
    mg.timer -= 1/60;
    if (mg.timer <= 0) {
      mg.phase = 'won';
      showToast(`✈️ 遊戲結束！擊殺 ${mg.score} 人！`);
      if (mg.score >= 3) addFruitCoin(30);
      setTimeout(()=>{ exitMiniGame(); }, 2000);
    }
    // Spawn enemies
    if (Math.random() < 0.03 && mgEnemies.length < 8) {
      mgEnemies.push({
        x: Math.random()*W, y: 20,
        vx: (Math.random()-0.5)*2, vy: 0.5+Math.random(),
        hp: 3, w: 24, h: 24
      });
    }
    // Move enemies
    mgEnemies.forEach(e => {
      e.x += e.vx; e.y += e.vy;
      if (e.y > H) { e.hp = 0; }
    });
    mgEnemies = mgEnemies.filter(e => e.hp > 0);
    
    // Move bullets
    mgBullets.forEach(b => { b.y -= 5; });
    mgBullets = mgBullets.filter(b => b.y > 0);
    
    // Collision
    mgBullets.forEach(b => {
      mgEnemies.forEach(e => {
        if (Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<20) {
          e.hp -= mg.damage;
          b.hp = 0;
          if (e.hp <= 0) {
            mg.score++;
            for (let i=0;i<8;i++) {
              mgParticles.push({x:e.x,y:e.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:30,color:['#f39c12','#e74c3c','#e67e22'][Math.floor(Math.random()*3)]});
            }
          }
        }
      });
    });
    mgBullets = mgBullets.filter(b => b.hp > 0);
    
    // Particles
    mgParticles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.life--; });
    mgParticles = mgParticles.filter(p => p.life > 0);
  }
  
  if (mg.type === 'clown') {
    // Simple simulation - rounds progress
    if (frameCount % 180 === 0) {
      mg.round++;
      if (mg.round > 5) {
        mg.phase = 'won';
        showToast(`🎉 好蛋陣營獲勝！`);
        addFruitCoin(25);
        setTimeout(()=>{ exitMiniGame(); }, 2000);
      } else {
        showToast(`🗳️ 第 ${mg.round} 回合投票中...`);
      }
    }
  }
}

function drawMiniGame() {

  ctx.fillStyle = '#fff';

  ctx.textAlign = 'center';
  ctx.fillText('✕ 離開', 935, 30);
  
  if (mg.type === 'bomb') {
    // Bomb display
    ctx.font = '80px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('💣', 500, 250);
    ctx.font = '36px Arial';
    ctx.fillStyle = '#e74c3c';
    ctx.fillText(`⏱ ${Math.ceil(mg.timer)}s`, 500, 330);
    ctx.font = '18px Arial';
    ctx.fillStyle = '#f39c12';
    ctx.fillText(`存活: ${mg.alive}/24 人`, 500, 370);
    ctx.fillText('碰到其他玩家傳遞炸彈！', 500, 400);
    ctx.font = '14px Arial';
    ctx.fillStyle = '#aaa';
    ctx.fillText('按 ESC 離開', 500, 440);
    
    // Timer bar
    ctx.fillStyle = '#333';
    ctx.fillRect(300, 450, 400, 20);
    ctx.fillStyle = mg.timer > 5 ? '#27ae60' : '#e74c3c';
    ctx.fillRect(300, 450, 400*(mg.timer/15), 20);
  }
  
  if (mg.type === 'fighter') {
    // Player ship
    ctx.fillStyle = '#3498db';
    ctx.beginPath();
    ctx.moveTo(480, 520); ctx.lineTo(520, 520); ctx.lineTo(500, 490);
    ctx.fill();
    
    // Enemies
    mgEnemies.forEach(e => {
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath();
      ctx.moveTo(e.x-12, e.y+12); ctx.lineTo(e.x+12, e.y+12); ctx.lineTo(e.x, e.y-12);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(e.x-15, e.y-8, 30, 3*(3-e.hp+1));
    });
    
    // Bullets
    mgBullets.forEach(b => {
      ctx.fillStyle = '#f1c40f';
      ctx.fillRect(b.x-2, b.y-6, 4, 12);
    });
    
    // Particles
    mgParticles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life/30;
      ctx.fillRect(p.x-2, p.y-2, 4, 4);
    });
    ctx.globalAlpha = 1;
    
    // HUD
    ctx.fillStyle = '#fff';
    ctx.font = '18px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`❤️ ${mg.hp}`, 20, 60);
    ctx.fillText(`🎯 ${mg.score}`, 20, 90);
    ctx.fillText(`⏱ ${Math.ceil(mg.timer)}s`, 20, 120);
    
    // Power-ups
    ctx.font = '12px Arial';
    ctx.textAlign = 'right';
    ctx.fillStyle = mg.usedShield?'#666':'#2ecc71';
    ctx.fillText(`🛡️ ${mg.usedShield?'已用':'可用'}`, W-20, 60);
    ctx.fillStyle = mg.usedSpeed?'#666':'#2ecc71';
    ctx.fillText(`⚡ ${mg.usedSpeed?'已用':'可用'}`, W-20, 80);
    ctx.fillStyle = mg.usedDamage?'#666':'#2ecc71';
    ctx.fillText(`🔥 ${mg.usedDamage?'已用':'可用'}`, W-20, 100);
    
    ctx.font = '14px Arial';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#aaa';
    ctx.fillText('滑鼠射擊 · 道具欄在右上方', 500, 650);
  }
  
  if (mg.type === 'clown') {
    ctx.font = '48px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🎭 抓出小丑蛋', 500, 200);
    ctx.font = '24px Arial';
    ctx.fillStyle = '#f39c12';
    ctx.fillText(mg.msg, 500, 260);
    ctx.font = '18px Arial';
    ctx.fillStyle = '#ccc';
    ctx.fillText(`回合: ${mg.round}/5  |  存活: ${mg.alive} 人`, 500, 310);
    ctx.fillText('透過投票找出隱藏的小丑蛋！', 500, 350);
    
    // Players
    const roles = ['😇','😇','😇','😇','😇','😇','😇','😇','😇','😇','🤡','🤡','🧑‍🦯','🧑‍🦯','🧑‍🦯','🧑‍🦯','🧑‍🦯','🧑‍🦯','🧑‍🦯','🧑‍🦯'];
    for (let i=0;i<12;i++) {
      const px = 100 + (i%6)*140;
      const py = 400 + Math.floor(i/6)*70;
      ctx.font = '24px Arial';
      ctx.fillText('🥚', px, py);
      ctx.font = '10px Arial';
      ctx.fillStyle = '#aaa';
      ctx.fillText(`玩家${i+1}`, px, py+20);
    }
  }
}

function handleMiniGameClick(mx, my) {
  if (!G.mg) return;
  const mg = G.mg;
  
  // Exit button area (top-right corner)
  if (mx > 880 && my < 50) {
    exitMiniGame();
    return;
  }
  
  if (mg.type === 'bomb' && mg.phase === 'playing') {
    // Click to try passing bomb (simulation)
    showToast('💥 按 ESC 或點右上角 ✕ 離開');
  }
  
  if (mg.type === 'fighter' && mg.phase === 'playing') {
    if (mgBullets.length < 5) {
      mgBullets.push({ x: mx, y: 500, hp: 1 });
    }
  }
  
  if (mg.type === 'clown' && mg.phase === 'playing') {
    showToast('🗳️ 投票完成！');
  }
}

// ===== SAVE / LOAD =====
function saveGame() {
  localStorage.setItem('fruitCoin', G.fruitCoin);
  localStorage.setItem('sparkleCoin', G.sparkleCoin);
  localStorage.setItem('gameVersion', '2');
}
setInterval(saveGame, 10000);

function loadGame() {
  // Force clean localStorage if old version
  if (!localStorage.getItem('gameVersion')) {
    localStorage.clear();
    localStorage.setItem('gameVersion', '2');
  }
  
  G.fruitCoin = parseInt(localStorage.getItem('fruitCoin')||'100');
  G.sparkleCoin = parseInt(localStorage.getItem('sparkleCoin')||'10');
  G.roomCards = parseInt(localStorage.getItem('roomCards')||'10');
  document.getElementById('fruitCoin').textContent = G.fruitCoin;
  document.getElementById('sparkleCoin').textContent = G.sparkleCoin;
  
  const equippedHead = localStorage.getItem('equippedHead');
  const equippedBody = localStorage.getItem('equippedBody');
  
  // Helper: find item by id from shop or gacha
  function findItem(id) {
    if (!id) return null;
    if (id.startsWith('gacha_')) {
      const gachaDecos = JSON.parse(localStorage.getItem('gachaDecos')||'[]');
      return gachaDecos[parseInt(id.replace('gacha_',''))] || null;
    }
    return SHOP_ITEMS.find(i=>i.id===id) || null;
  }
  
  // Validate: head items should only go to head slot, body items to body slot
  const headItem = findItem(equippedHead);
  const bodyItem = findItem(equippedBody);
  
  if (headItem && (!headItem.cat || headItem.cat === 'head')) {
    G.equippedHead = headItem;
  } else if (headItem && headItem.cat === 'body') {
    // Wrong slot: move to body or discard
    if (!bodyItem) {
      localStorage.setItem('equippedBody', equippedHead);
      localStorage.removeItem('equippedHead');
    } else {
      localStorage.removeItem('equippedHead');
    }
  }
  
  if (bodyItem && bodyItem.cat === 'body') {
    G.equippedBody = bodyItem;
  } else if (bodyItem && (!bodyItem.cat || bodyItem.cat === 'head')) {
    // Wrong slot: move to head or discard
    if (!headItem) {
      localStorage.setItem('equippedHead', equippedBody);
      localStorage.removeItem('equippedBody');
    } else {
      localStorage.removeItem('equippedBody');
    }
  }
  
  // Achievement progress
  const done = JSON.parse(localStorage.getItem('achievementsDone')||'[]');
  done.forEach(id => {
    const a = G.achievements.find(x=>x.id===id);
    if (a) { a.done = true; a.progress = a.goal; }
  });
  
  G.achievements.forEach(a => {
    if (a.id==='a2') a.progress = G.fruitCoin;
    if (a.id==='a8') a.progress = G.fruitCoin;
  });
  
  const visited = parseInt(localStorage.getItem('visitedIslands')||'1');
  G.achievements.find(a=>a.id==='a4').progress = visited;
  const gc = parseInt(localStorage.getItem('gachaCount')||'0');
  G.achievements.find(a=>a.id==='a3').progress = gc;
}

// ===== ROUND RECT POLYFILL =====
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    if (r > w/2) r = w/2;
    if (r > h/2) r = h/2;
    this.moveTo(x+r,y);
    this.arcTo(x+w,y, x+w,y+h, r);
    this.arcTo(x+w,y+h, x,y+h, r);
    this.arcTo(x,y+h, x,y, r);
    this.arcTo(x,y, x+w,y, r);
  };
}
